<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Anniversary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Question Screen -->
  <div id="question-screen">
    <h1>💌 A little question...</h1>
    <p>Where did we have our first date?</p>

    <input type="text" id="answer" placeholder="Your answer here ">
    <button onclick="checkAnswer()">Submit</button>

    <p id="error-message"></p>
  </div>

  <!-- Hidden Anniversary Screen -->
  <div id="anniversary-screen" style="display:none;">
    <h1>❤️ Happy 1 Year Anniversary ❤️</h1>
    <p>Every day with you is my favourite memory</p>

    <div class="gallery">
      <img src="image1.jpg" alt="Memory 1">
      <img src="image2.jpeg" alt="Memory 2">
      <img src="image3.jpeg" alt="Memory 3">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
